<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>月よの川「の川ソ | الموقع الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0c1a, #03050b);
            font-family: 'Cairo', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* زخارف خلفية */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-decoration span {
            position: absolute;
            font-size: 4rem;
            opacity: 0.08;
            font-family: monospace;
        }

        .bg-decoration span:nth-child(1) { top: 5%; left: 3%; transform: rotate(-10deg); }
        .bg-decoration span:nth-child(2) { bottom: 8%; right: 2%; transform: rotate(15deg); font-size: 6rem; }
        .bg-decoration span:nth-child(3) { top: 20%; right: 8%; font-size: 3rem; opacity: 0.1; }
        .bg-decoration span:nth-child(4) { bottom: 25%; left: 5%; font-size: 4.5rem; opacity: 0.07; }
        .bg-decoration span:nth-child(5) { top: 60%; left: 15%; font-size: 2.8rem; }

        /* الحاوية الرئيسية */
        .glass-card {
            position: relative;
            z-index: 2;
            max-width: 750px;
            width: 100%;
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.1);
            padding: 2.5rem 2rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        /* الشعار / النص الأزرق الزخرفي */
        .logo-area {
            margin-bottom: 2rem;
        }

        .logo-text {
            font-family: 'Noto Sans JP', monospace;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #00ccff, #0099ff, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0, 160, 255, 0.4);
            position: relative;
            display: inline-block;
        }

        .logo-text::before,
        .logo-text::after {
            content: "✧";
            font-size: 2rem;
            color: #00ccff;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            text-shadow: 0 0 8px cyan;
            display: inline-block;
            opacity: 0.9;
            margin: 0 10px;
        }

        .logo-text::after {
            content: "✧";
        }

        .sub {
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: #6c8db0;
            margin-top: 8px;
            word-break: keep-all;
        }

        /* القسم الشبيه بالترحيب */
        .hero-message {
            background: rgba(0, 20, 40, 0.6);
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            margin: 2rem 0;
            border-left: 4px solid #0af;
            border-right: 4px solid #0af;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.2);
        }

        .greeting {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Noto Sans JP', 'Cairo', sans-serif;
            background: linear-gradient(120deg, #ffffff, #aaf0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }

        .greeting i {
            color: #0af;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            margin: 0 5px;
        }

        .description {
            color: #bcd0f0;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* الأسماء واليوزرات - قابلة للنقر */
        .names-container {
            margin: 2rem 0 1rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .owner-box, .bot-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: rgba(0, 30, 50, 0.5);
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
            transition: 0.2s;
            cursor: pointer;
        }

        .owner-box:hover, .bot-box:hover {
            background: rgba(0, 80, 120, 0.5);
            transform: scale(1.01);
            border: 1px solid rgba(0, 255, 255, 0.5);
        }

        .bot-box {
            margin-bottom: 0;
        }

        .label {
            font-family: 'Cairo', monospace;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            background: linear-gradient(145deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .username {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            background: #0a1a2a;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid cyan;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
            color: #c0e4ff;
            word-break: break-all;
            pointer-events: none;
        }

        .username i {
            color: #0af;
            font-size: 1.1rem;
        }

        /* زخرفة إضافية */
        .ornament {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0 10px;
            font-size: 1.2rem;
            color: #2f6f8f;
        }

        .ornament span {
            font-size: 1.3rem;
        }

        footer {
            font-size: 0.7rem;
            color: #446688;
            margin-top: 2rem;
            border-top: 1px dashed #2c4c6e;
            padding-top: 1rem;
        }

        /* تلميح أن العنصر قابل للنقر */
        .click-hint {
            font-size: 0.7rem;
            color: #4aa;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        @media (max-width: 550px) {
            .glass-card {
                padding: 1.5rem;
            }
            .logo-text {
                font-size: 1.8rem;
            }
            .logo-text::before,
            .logo-text::after {
                font-size: 1rem;
                margin: 0 4px;
            }
            .username {
                font-size: 0.85rem;
                padding: 0.3rem 0.7rem;
            }
            .label {
                font-size: 1rem;
            }
            .owner-box, .bot-box {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* تأثير نبض */
        @keyframes softGlow {
            0% { text-shadow: 0 0 2px cyan; border-color: rgba(0, 255, 255, 0.3);}
            100% { text-shadow: 0 0 8px cyan; border-color: rgba(0, 255, 255, 0.8);}
        }
        .username {
            animation: softGlow 2s infinite alternate;
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <span>⚡</span>
        <span>⛩️</span>
        <span>🌊</span>
        <span>✨</span>
        <span>🌀</span>
    </div>

    <div class="glass-card">
        <!-- الشعار / الاسم الأزرق الرئيسي -->
        <div class="logo-area">
            <div class="logo-text">
                月よの川「の川ソ
            </div>
            <div class="sub">
                ✦ 月の光  ✦  川の囁き  ✦
            </div>
        </div>

        <!-- القسم الشبيه بالترحيب -->
        <div class="hero-message">
            <div class="greeting">
                <i class="fas fa-star-of-life"></i> 
                أهلاً بك في فضاء القمر 
                <i class="fas fa-moon"></i>
            </div>
            <div class="description">
                「 حيث يتحد الجمال الرقمي مع روح الابتكار 」
            </div>
        </div>

        <!-- الأسماء واليوزرات - قابلة للنقر وتنقل للتيليجرام -->
        <div class="names-container">
            <div class="owner-box" onclick="window.open('https://t.me/DM_ZO', '_blank')">
                <div class="label">
                    <i class="fas fa-crown"></i> 
                    ★  المالك  ★
                </div>
                <div class="username">
                    <i class="fab fa-telegram"></i> @DM_ZO
                </div>
            </div>
            <div class="bot-box" onclick="window.open('https://t.me/DM_ZO9794_bot', '_blank')">
                <div class="label">
                    <i class="fas fa-robot"></i>
                    ✧  البوت الرسمي  ✧
                </div>
                <div class="username">
                    <i class="fab fa-telegram-plane"></i> @DM_ZO9794_bot
                </div>
            </div>
            <div class="click-hint">
                <i class="fas fa-hand-pointer"></i> اضغط على أيقونة المالك أو البوت للدردشة مباشرة <i class="fab fa-telegram"></i>
            </div>
        </div>

        <!-- زخرفة سفلية جميلة -->
        <div class="ornament">
            <span>◈</span> <span>❖</span> <span>✧</span> <span>✦</span> <span>✧</span> <span>❖</span> <span>◈</span>
        </div>

        <footer>
            <i class="fas fa-water"></i> 月の川  —  حيث تبدأ الرحلة  <i class="fas fa-feather-alt"></i>
        </footer>
    </div>
</body>
</html>
